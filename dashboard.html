<!DOCTYPE html>
<html>
<head>

<title>Disease Prediction</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(45deg,#ff6a00,#ee0979,#00c6ff,#0072ff);
background-size:400% 400%;
animation:bg 8s infinite;
color:white;
padding:30px;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.box{
background:white;
color:black;
padding:25px;
border-radius:15px;
display:inline-block;
width:320px;
}

.symptoms{
text-align:left;
height:300px;
overflow-y:auto;
}

button{
padding:10px 20px;
margin-top:15px;
border:none;
border-radius:6px;
background:#0072ff;
color:white;
cursor:pointer;
}

#result{
margin-top:25px;
font-size:22px;
font-weight:bold;
background:white;
color:black;
padding:15px;
border-radius:10px;
display:inline-block;
}

.logout{
background:red;
margin-top:10px;
}

</style>

<script>

function predictDisease(){

var selected=[];
var boxes=document.querySelectorAll("input[name='symptom']:checked");

boxes.forEach(function(box){
selected.push(box.value);
});

var disease="No disease detected";

if(selected.includes("fever") && selected.includes("cough"))
disease="Flu";

else if(selected.includes("fever") && selected.includes("vomiting"))
disease="Food Poisoning";

else if(selected.includes("headache") && selected.includes("blurvision"))
disease="Migraine";

else if(selected.includes("fatigue") && selected.includes("weightloss"))
disease="Diabetes";

else if(selected.includes("shortbreath") && selected.includes("chestpain"))
disease="Heart Problem";

else if(selected.includes("itching") && selected.includes("rash"))
disease="Skin Allergy";

else if(selected.includes("cold") && selected.includes("sorethroat"))
disease="Common Cold";

else if(selected.includes("dizziness") && selected.includes("fatigue"))
disease="Low Blood Pressure";

else if(selected.includes("diarrhea") && selected.includes("stomach"))
disease="Stomach Infection";

else if(selected.includes("backpain") && selected.includes("legpain"))
disease="Muscle Pain";

document.getElementById("result").innerHTML="🩺 Possible Disease: "+disease;

}

function logout(){
window.location="index.html";
}

</script>

</head>

<body>

<h1>🩺 Disease Prediction System</h1>

<div class="box">

<div class="symptoms">

<label><input type="checkbox" name="symptom" value="fever"> Fever</label>
<label><input type="checkbox" name="symptom" value="cough"> Cough</label>
<label><input type="checkbox" name="symptom" value="headache"> Headache</label>
<label><input type="checkbox" name="symptom" value="stomach"> Stomach Pain</label>
<label><input type="checkbox" name="symptom" value="cold"> Cold</label>
<label><input type="checkbox" name="symptom" value="vomiting"> Vomiting</label>
<label><input type="checkbox" name="symptom" value="fatigue"> Fatigue</label>
<label><input type="checkbox" name="symptom" value="sorethroat"> Sore Throat</label>
<label><input type="checkbox" name="symptom" value="chestpain"> Chest Pain</label>
<label><input type="checkbox" name="symptom" value="dizziness"> Dizziness</label>

<label><input type="checkbox" name="symptom" value="diarrhea"> Diarrhea</label>
<label><input type="checkbox" name="symptom" value="constipation"> Constipation</label>
<label><input type="checkbox" name="symptom" value="backpain"> Back Pain</label>
<label><input type="checkbox" name="symptom" value="jointpain"> Joint Pain</label>
<label><input type="checkbox" name="symptom" value="toothache"> Tooth Ache</label>
<label><input type="checkbox" name="symptom" value="earpain"> Ear Pain</label>
<label><input type="checkbox" name="symptom" value="rash"> Skin Rash</label>
<label><input type="checkbox" name="symptom" value="itching"> Itching</label>
<label><input type="checkbox" name="symptom" value="weightloss"> Weight Loss</label>
<label><input type="checkbox" name="symptom" value="blurvision"> Blur Vision</label>

<label><input type="checkbox" name="symptom" value="shortbreath"> Short Breath</label>
<label><input type="checkbox" name="symptom" value="sweating"> Sweating</label>
<label><input type="checkbox" name="symptom" value="nausea"> Nausea</label>
<label><input type="checkbox" name="symptom" value="legpain"> Leg Pain</label>
<label><input type="checkbox" name="symptom" value="neckpain"> Neck Pain</label>
<label><input type="checkbox" name="symptom" value="anxiety"> Anxiety</label>
<label><input type="checkbox" name="symptom" value="depression"> Depression</label>
<label><input type="checkbox" name="symptom" value="sleep"> Sleep Problem</label>
<label><input type="checkbox" name="symptom" value="hairfall"> Hair Fall</label>
<label><input type="checkbox" name="symptom" value="dryskin"> Dry Skin</label>

</div>

<button onclick="predictDisease()">Predict Disease</button>

<br>

<button class="logout" onclick="logout()">Logout</button>

</div>

<br><br>

<div id="result">Result will appear here</div>

</body>
  </html>
